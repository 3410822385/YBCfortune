# ==========================================================================
# s4sfortune config
#
# adverts: strings broadcast to everyone once an hour with a ⭐ prefix.
#   The literal text "future year" is replaced with the current year.
#   Empty list = no broadcasts.
#
# regularFortunes / specialFortunes: what /roll can land on. A roll is a
# special one 1 time in 20 (falls back to regular when no specials exist).
# Edit + /fortunereload — no restart or recompile needed.
#
# Fortune schema:
#   color: "#rrggbb"      chat color of the announcement
#   text: "..."           the fortune text (legacy § codes allowed)
#   weight: <n>           relative chance within its pool; default 10 when
#                         omitted (weight 5 = half as likely as a default roll)
#   commands: [ ... ]     console commands; %player% = the roller's name
#   actions: [ ... ]      built-in primitives for things commands can't do:
#     "fire <ticks>"                  set the roller on fire
#     "sethealth <halfhearts>"        set absolute health (2 = one heart)
#     "sethunger <0-20>"              set absolute food level
#     "setair <ticks>"                set remaining air (drowning gasp)
#     "tempban <minMin> <maxMin>"     timed ban, random minutes in range
#     "lightning-effect"              visual-only lightning strike
#     "velocity <x> <y> <z>"          launch the roller
#     "chat-as <message>"             the roller says it in chat
#     "delay <ticks>"                 wait before the remaining actions
#     "run <command>"                 console command as an action (delayable)
#     "drop-inventory"                spill the whole inventory on the ground
#     "drop-held-item"                drop the main-hand item
#     "shuffle-inventory"             scramble the 36 storage slots
#     "swap-random-player"            swap places with a random online player
#     "steal-random-item"             stash a random inventory stack (needs the
#                                     stash: section enabled — see below)
#     "freeze <ticks>"                powder-snow freeze (140 = fully frozen)
#     "setfall <distance>"            fall damage on next landing
#     "spin"                          randomly spin the roller's camera
#     "sound <key> [vol] [pitch]"     every player hears it at their position
#     "broadcast <message>"           MiniMessage broadcast to everyone
#     "drop-item <MATERIAL> [count]"  drop items on the ground; map form for
#                                     custom name/lore (MiniMessage):
#       - drop-item: {material: CAKE, count: 1, name: "<gold>Cake", lore: ["<gray>..."]}
#   random:               weighted branches, ONE picked per roll; each branch
#                         takes weight + the same commands/actions/random keys
# Execution order: commands, then actions, then random.
# ==========================================================================

# Optional "OP RAN WITH THE MONEY" stash for the steal-random-item action.
# When enabled: stolen stacks are stored in plugins/s4sfortune/stash.yml
# (human-readable, with a paste-ready give-command per entry for manual
# restoration), a chest is kept at the coordinates and right-clicking it
# returns the clicking player's stolen items. Disabled = nothing loads and
# stash.yml is never touched.
